name: ci-pipeline

on:
  push:
    branches:
      - staging
      - main
  pull_request:
    branches:
      - staging
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff check
        run: uv run ruff check

      - name: Pyright
        run: uv run basedpyright

  test:
    name: Test
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        env:
          EXO_TESTS: "1"
          EXO_DASHBOARD_DIR: ${{ github.workspace }}/dashboard-react/dist/
          EXO_RESOURCES_DIR: ${{ github.workspace }}/resources
        run: uv run pytest src -m "not slow" --import-mode=importlib
