model_id = "mlx-community/Qwen3.5-9B-MLX-4bit"
n_layers = 32
hidden_size = 4096
num_key_value_heads = 4
supports_tensor = true
tasks = ["TextGeneration"]
family = "qwen"
quantization = "4bit"
base_model = "Qwen3.5 9B"
capabilities = ["text", "thinking", "thinking_toggle"]
context_length = 262144

[reasoning]
supports_toggle = true
format = "token_delimited"
default_effort = "medium"
disabled_effort = "none"

# MTP speculative decoding validated 2026-06-04 on M4/24GB: 87.6% draft
# acceptance (657/750 across a 10-prompt suite, exact-attempt metric),
# 1.20x decode speedup. Base heads chosen deliberately: a 750-draft/arm
# comparison measured base (87.6%) and instruct (87.3%) heads as
# statistically indistinguishable, so one base sidecar serves every
# variant of this backbone (Skulk #192 / PR #193 validation sweep).
# Depth stays 1: chained depth-2 measured SLOWER here (1.15x vs 1.30x) —
# the drafter's extra chain cost outweighs the tokens on a 9B-fast trunk.
[runtime]
mtp_heads = true
mtp_max_depth = 1
mtp_sidecar_repo = "FoxlightAI/qwen3-5-9b-base-mtp"

[storage_size]
in_bytes = 5950062560
