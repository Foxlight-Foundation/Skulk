model_id = "mlx-community/Qwen3.5-9B-MLX-4bit"
n_layers = 32
hidden_size = 4096
num_key_value_heads = 4
supports_tensor = true
tasks = ["TextGeneration"]
family = "qwen"
quantization = "4bit"
base_model = "Qwen3.5 9B"
capabilities = ["text", "thinking", "thinking_toggle"]
context_length = 262144

[reasoning]
supports_toggle = true
format = "token_delimited"
default_effort = "medium"
disabled_effort = "none"

# MTP speculative decoding re-validated 2026-06-05 on M4/24GB under the
# bonus-driven cadence (deferred replay + quantize-on-load sidecar):
# 79% acceptance, 28.8 tok/s vs 20.9 vanilla (1.38x greedy; 85%/1.43x at
# temperature 0.7). Base heads chosen deliberately: a 750-draft/arm
# comparison measured base (87.6%) and instruct (87.3%) heads as
# statistically indistinguishable, so one base sidecar serves every
# variant of this backbone (Skulk #192 / PR #193 validation sweep).
# Depth stays 1: chained depth-2 measured SLOWER than vanilla (0.87x) —
# 56% chained acceptance cannot carry the extra cost on a 9B-fast trunk.
[runtime]
mtp_heads = true
mtp_max_depth = 1
mtp_sidecar_repo = "FoxlightAI/qwen3-5-9b-base-mtp"

[storage_size]
in_bytes = 5950062560
