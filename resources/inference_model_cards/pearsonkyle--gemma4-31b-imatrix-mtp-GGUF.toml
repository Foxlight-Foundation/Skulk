# Gemma 4 31B-it GGUF served via the llama_server engine with native MTP.
# Unlike Qwen3.6/DeepSeek/GLM (MTP heads baked into the base GGUF), Gemma 4's MTP
# is its *assistant* loaded as a SEPARATE draft GGUF via llama-server's
# --model-draft (llama.cpp PR #23398): base gemma-4-31B-it + mtp-gemma-4-31B-it,
# --spec-type draft-mtp. So this card sets served_spec_draft_repo/file (the draft
# GGUF), which the runner downloads as a companion and passes as --model-draft.
# Text-only (the repo's mmproj projector is not loaded). supports_tensor = false:
# served single-node. Architecture from google/gemma-4-31B-it config (60 layers,
# hidden 5376, 16 KV heads, 262144 ctx).
model_id = "pearsonkyle/gemma4-31b-imatrix-mtp-GGUF"
n_layers = 60
hidden_size = 5376
num_key_value_heads = 16
supports_tensor = false
tasks = ["TextGeneration"]
family = "gemma"
quantization = "IQ4_XS"
base_model = "Gemma 4 31B-it"
capabilities = ["text"]
context_length = 262144
gguf_file = "gemma-4-31B-it-IQ4_XS.gguf"
trust_remote_code = false

[tooling]
supports_tool_calling = true
tool_call_format = "generic"

[runtime]
# Native MTP via the Gemma 4 assistant as a SEPARATE draft GGUF (--model-draft).
served_spec_type = "draft_mtp"
served_spec_n_max = 4
served_spec_draft_repo = "pearsonkyle/gemma4-31b-imatrix-mtp-GGUF"
served_spec_draft_file = "mtp-gemma-4-31B-it.gguf"

[placement]
compatible_backends = ["llama_server-vulkan", "llama_server-rocm", "llama_server-cuda", "llama_server-cpu"]
backend_preference = ["llama_server-vulkan", "llama_server-rocm", "llama_server-cuda", "llama_server-cpu"]

[storage_size]
in_bytes = 16735790016
