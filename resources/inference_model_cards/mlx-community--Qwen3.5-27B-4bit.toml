model_id = "mlx-community/Qwen3.5-27B-4bit"
n_layers = 64
hidden_size = 5120
num_key_value_heads = 4
supports_tensor = true
tasks = ["TextGeneration"]
family = "qwen"
quantization = "4bit"
base_model = "Qwen3.5 27B"
capabilities = ["text", "thinking", "thinking_toggle"]

[reasoning]
supports_toggle = true
format = "token_delimited"
default_effort = "medium"
disabled_effort = "none"

# MTP speculative decoding validated 2026-06-04 on M4/24GB at depth 2:
# 1.92x decode speedup (5.4 -> 10.4 tok/s), 78% chained acceptance, greedy
# parity OK. Depth 2 pays only on models this size — the trunk dominates
# the drafter's extra chain cost (the 9B measured slower at depth 2 than
# depth 1 and stays at 1) (Skulk #192 / PR #193 / depth-K follow-up).
[runtime]
mtp_heads = true
mtp_max_depth = 2
mtp_sidecar_repo = "FoxlightAI/qwen3-5-27b-mtp"

[storage_size]
in_bytes = 16054266848
