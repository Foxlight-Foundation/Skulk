model_id = "mlx-community/gemma-4-26b-a4b-it-4bit"
n_layers = 30
hidden_size = 2816
num_key_value_heads = 8
supports_tensor = false
tasks = ["TextGeneration"]
family = "gemma"
quantization = "4bit"
base_model = "Gemma 4 26B A4B"
capabilities = ["text", "vision", "thinking"]
context_length = 262144

[reasoning]
supports_toggle = true
format = "channel_delimited"
default_effort = "medium"
disabled_effort = "none"

[modalities]
supports_native_multimodal = true

[tooling]
tool_call_format = "gemma4"

[runtime]
prompt_renderer = "gemma4"
output_parser = "gemma4"
# Companion drafter for speculative decoding (Gemma 4 assistant pattern).
# ACTIVE since gemma4-mtp Phase C; re-validated 2026-06-05 under the
# bonus-driven cadence at depth 1 — 84% acceptance, 35.1 tok/s vs ~16
# warm vanilla (~2.2x; the MoE vanilla baseline is noisy and warms from
# ~10 to ~16-19 tok/s across runs, speculative throughput is stable).
# Depth > 1 measured slower (depth 2: 65%, 31.2 tok/s) — chain acceptance
# decay outweighs the extra rows; leave depth at the default 1.
assistant_model_repo = "mlx-community/gemma-4-26B-A4B-it-assistant-bf16"
# MLX_METAL_FAST_SYNCH wedges the GPU command queue on this model under the
# ring backend with multimodal load: the runner thread enters TH_UNINT in
# the AGX driver at pipeline_last_eval_output, transitively starves
# WindowServer, and trips the macOS userspace watchdog into a kernel panic.
# Reproduced 2026-04 on M4 (Mac16,10) with multinode pipeline-parallel.
metal_fast_synch = false

